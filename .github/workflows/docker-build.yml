# =============================================================================
# Pipeline 1: Build & push the ai-scanner Docker image to GHCR
# =============================================================================
# Triggers:
#   - Push to main that changes image-related files (Dockerfile, requirements,
#     package.json) — keeps the image fresh automatically
#   - Weekly schedule — picks up upstream tool releases (Trivy CVE DB, etc.)
#   - Manual dispatch — useful for testing or emergency rebuilds
#
# Outputs:
#   ghcr.io/YOUR_ORG/ai-scanner:latest
#   ghcr.io/YOUR_ORG/ai-scanner:<git-sha>   (immutable, for pinning)
# =============================================================================

name: Build & Push Scanner Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - requirements.txt
      - package.json
      - .github/workflows/docker-build.yml

  schedule:
    # Every Monday at 02:00 UTC — picks up weekly tool/CVE-db updates
    - cron: "0 2 * * 1"

  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR? (set false to build-only for testing)"
        required: false
        default: "true"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ai-scanner

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Set up Docker Buildx (enables layer caching + multi-platform) ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate to GHCR ─────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'workflow_dispatch' || inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provisioned, no setup needed

      # ── Generate image tags ──────────────────────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # ── Build (and optionally push) ──────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — drastically speeds up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args let you override tool versions without editing the Dockerfile
          build-args: |
            TRIVY_VERSION=0.51.4
            GITLEAKS_VERSION=8.18.2
            HADOLINT_VERSION=2.12.0
            NODE_MAJOR=20

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Scanner Image Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
